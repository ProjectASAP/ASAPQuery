      - id: cargo-test-promql-utilities
        name: cargo test (promql_utilities)
        description: Run promql_utilities tests.
        entry: bash -c 'cargo test --manifest-path asap-common/dependencies/rs/promql_utilities/Cargo.toml'
        language: system
