tables:
  - name: netflow_table
    time_column: time
    value_columns: [pkt_len]
    metadata_columns: [srcip, dstip, proto]
query_groups:
  - id: 1
    repetition_delay: 1
    controller_options:
      accuracy_sla: 0.95
      latency_sla: 100.0
    queries:
      - >-
        SELECT proto, srcip, dstip, quantile(0.99)(pkt_len) AS p99_pkt_len
        FROM netflow_table
        WHERE time BETWEEN DATEADD(s, -11, NOW()) AND DATEADD(s, -10, NOW())
        GROUP BY proto, srcip, dstip
        ORDER BY p99_pkt_len DESC
        LIMIT 10
aggregate_cleanup:
  policy: no_cleanup
