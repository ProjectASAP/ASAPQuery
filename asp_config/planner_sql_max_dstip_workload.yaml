tables:
  - name: netflow_table
    time_column: time
    value_columns: [pkt_len]
    metadata_columns: [srcip, dstip, proto]
query_groups:
  - id: 1
    repetition_delay: 1
    controller_options:
      accuracy_sla: 0.95
      latency_sla: 100.0
    queries:
      - >-
        SELECT dstip, MAX(pkt_len) AS max_pkt_len
        FROM netflow_table
        WHERE time BETWEEN DATEADD(s, -11, NOW()) AND DATEADD(s, -10, NOW())
        GROUP BY dstip
        ORDER BY max_pkt_len DESC
        LIMIT 10
      - >-
        SELECT dstip, MAX(pkt_len) AS max_pkt_len
        FROM netflow_table
        WHERE time BETWEEN DATEADD(s, -15, NOW()) AND DATEADD(s, -10, NOW())
        GROUP BY dstip
        ORDER BY max_pkt_len DESC
        LIMIT 10
      - >-
        SELECT dstip, MAX(pkt_len) AS max_pkt_len
        FROM netflow_table
        WHERE time BETWEEN DATEADD(s, -70, NOW()) AND DATEADD(s, -10, NOW())
        GROUP BY dstip
        ORDER BY max_pkt_len DESC
        LIMIT 10
      - >-
        SELECT dstip, MAX(pkt_len) AS max_pkt_len
        FROM netflow_table
        WHERE time BETWEEN DATEADD(s, -310, NOW()) AND DATEADD(s, -10, NOW())
        GROUP BY dstip
        ORDER BY max_pkt_len DESC
        LIMIT 10
aggregate_cleanup:
  policy: no_cleanup
