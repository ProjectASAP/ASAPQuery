query_groups:
  - id: 1
    queries:
      - "sum_over_time(http_requests_total[5m])"
    repetition_delay: 300
    controller_options:
      accuracy_sla: 0.99
      latency_sla: 1.0
metrics:
  - metric: "http_requests_total"
    labels: ["instance", "job", "method", "status"]
aggregate_cleanup:
  policy: "read_based"
