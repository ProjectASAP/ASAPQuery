query_groups:
  - id: 1
    queries:
      - "rate(errors_total[5m]) / rate(requests_total[5m])"
      - "rate(errors_total[5m])"
    repetition_delay: 300
    controller_options:
      accuracy_sla: 0.99
      latency_sla: 1.0
metrics:
  - metric: "errors_total"
    labels: ["instance", "job"]
  - metric: "requests_total"
    labels: ["instance", "job"]
aggregate_cleanup:
  policy: "read_based"
