# ASAP Inference Config for ClickBench Hits Dataset
tables:
  - name: hits
    time_column: EventTime
    metadata_columns: [RegionID, OS, UserAgent, TraficSourceID]
    value_columns: [ResolutionWidth]

cleanup_policy:
  name: read_based

# Only quantile queries enabled (T5, T6)
queries:
  # # Spatial queries (1s window, partial labels)
  # - aggregations:
  #     - aggregation_id: 1
  #       read_count_threshold: 1
  #   query: |
  #     SELECT SUM(ResolutionWidth) FROM hits
  #     WHERE EventTime BETWEEN DATEADD(s, -1, NOW()) AND NOW()
  #     GROUP BY RegionID

  # - aggregations:
  #     - aggregation_id: 2
  #       read_count_threshold: 1
