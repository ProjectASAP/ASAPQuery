name: asapquery-dropin

# Self-contained ASAPQuery stack for existing Prometheus + Grafana deployments.
#
# Usage:
#   1. Adjust PROMETHEUS_URL in .env to point at your Prometheus.
#   2. docker compose up -d
#   3. Add remote_write to your prometheus.yml  ->  http://localhost:${REMOTE_WRITE_PORT}/receive
#   4. Point your Grafana datasource URL        ->  http://localhost:${QUERY_ENGINE_PORT}

networks:
  asap-network:
    driver: bridge

volumes:
  kafka-data:
  asap-planner-output:

services:
  #############################################################################
  # INFRASTRUCTURE
  #############################################################################

  kafka:
    image: apache/kafka:3.7.0
    container_name: asap-dropin-kafka
    hostname: kafka
    networks:
      - asap-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_MESSAGE_MAX_BYTES: 20971520
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20971520
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        chown -R appuser:appuser /tmp/kraft-combined-logs
        chmod -R 755 /tmp/kraft-combined-logs
        exec su appuser -c "/etc/kafka/docker/run"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: asap-dropin-kafka-init
    networks:
      - asap-network
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic flink_input \
          --partitions 1 --replication-factor 1 \
          --config max.message.bytes=20971520

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic flink_output \
          --partitions 1 --replication-factor 1 \
          --config max.message.bytes=20971520

        echo "Kafka topics created successfully"
    restart: "no"

  arroyo:
    image: ghcr.io/projectasap/asap-arroyo:v0.1.0
    container_name: asap-dropin-arroyo
    hostname: arroyo
    networks:
      - asap-network
    ports:
      - "${REMOTE_WRITE_PORT:-9091}:9091"
    volumes:
      - ./config/arroyo-config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml", "cluster"]
    environment:
      - ARROYO__API__RUN_HTTP_PORT=5115
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5115/api/v1/pipelines || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #############################################################################
  # INIT CONTAINERS
  #############################################################################

  asap-planner-rs:
    image: ghcr.io/projectasap/asap-planner-rs:v0.2.0
    container_name: asap-dropin-planner
    hostname: asap-planner-rs
    networks:
      - asap-network
    command:
      - "--output_dir=/asap-planner-output"
      - "--prometheus_scrape_interval=${PROMETHEUS_SCRAPE_INTERVAL:-15}"
      - "--streaming_engine=arroyo"
      - "--range-duration=300"
      - "--step=10"
      - "--prometheus-url=${PROMETHEUS_URL:-http://host.docker.internal:9090}"
      - "--query-language=promql"
      - "-v"
    volumes:
      - asap-planner-output:/asap-planner-output
    restart: "no"

  asap-summary-ingest:
    image: ghcr.io/projectasap/asap-summary-ingest:v0.2.0
    container_name: asap-dropin-summary-ingest
    hostname: asap-summary-ingest
    networks:
      - asap-network
    command:
      - "--config_file_path=/asap-planner-output/streaming_config.yaml"
      - "--source_type=prometheus_remote_write"
      - "--prometheus_base_port=9091"
      - "--prometheus_path=/receive"
      - "--prometheus_bind_ip=0.0.0.0"
      - "--parallelism=1"
      - "--output_kafka_topic=flink_output"
      - "--output_format=json"
      - "--pipeline_name=asap-dropin"
      - "--output_dir=/asap-summary-ingest-output"
      - "--arroyo_url=http://arroyo:5115/api/v1"
      - "--bootstrap_servers=kafka:9092"
    volumes:
      - asap-planner-output:/asap-planner-output:ro
      - ./output/asap-summary-ingest:/asap-summary-ingest-output
    depends_on:
      asap-planner-rs:
        condition: service_completed_successfully
      arroyo:
        condition: service_healthy
    restart: "no"

  #############################################################################
  # CORE SERVICE
  #############################################################################

  queryengine:
    image: ghcr.io/projectasap/asap-query-engine:v0.2.0
    container_name: asap-dropin-queryengine
    hostname: queryengine
    networks:
      - asap-network
    ports:
      - "${QUERY_ENGINE_PORT:-8088}:8088"
    environment:
      - RUST_LOG=INFO
      - RUST_BACKTRACE=1
    volumes:
      - asap-planner-output:/asap-planner-output:ro
      - ./output/queryengine:/app/outputs
    command:
      - "--kafka-topic=flink_output"
      - "--kafka-broker=kafka:9092"
      - "--input-format=json"
      - "--config=/asap-planner-output/inference_config.yaml"
      - "--streaming-config=/asap-planner-output/streaming_config.yaml"
      - "--prometheus-server=${PROMETHEUS_URL:-http://host.docker.internal:9090}"
      - "--prometheus-scrape-interval=${PROMETHEUS_SCRAPE_INTERVAL:-15}"
      - "--streaming-engine=arroyo"
      - "--delete-existing-db"
      - "--log-level=INFO"
      - "--output-dir=/app/outputs"
      - "--query-language=PROMQL"
      - "--lock-strategy=per-key"
      - "--decompress-json"
      - "--forward-unsupported-queries"
    depends_on:
      asap-summary-ingest:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
